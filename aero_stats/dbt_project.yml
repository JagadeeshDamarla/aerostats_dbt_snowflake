name: aero_stats

profile: aero_stats

seed-paths: ["seeds"]
model-paths: ["models","sources"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  aero_stats:
    +schema: raw

models:
  aero_stats:
    # Materialize staging models as views, and marts as tables
    staging:
      +materialized: view
    marts:
      +materialized: table
